databases:
  - name: aiprostore-db
    plan: free
    databaseName: aiprostore
    user: aiprostore

services:
  - type: web
    name: ai-pro-store
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: JWT_SECRET
        generateValue: true
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: BANK_MODE
        value: mock
      - key: BANK_ACCOUNT
        value: "0394709137"
      - key: BANK_NAME
        value: "MB Bank"
      - key: BANK_CODE
        value: MB
      - key: BANK_ACCOUNT_HOLDER
        value: ADMIN
      - key: ADMIN_EMAIL
        value: buiduchuy2010qn@gmail.com
      - key: ADMIN_PASSWORD
        value: DUCHUY2010#
      - key: ZALO_PHONE
        value: "0944255413"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: AI_MODEL
        value: grok-3-mini
      - key: DATABASE_URL
        fromDatabase:
          name: aiprostore-db
          property: connectionString